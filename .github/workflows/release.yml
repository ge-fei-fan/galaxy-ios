name: Release (iOS IPA)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --simulator

      - name: Create IPA
        run: |
          mkdir -p build/ios/ipa/Payload
          cp -R build/ios/iphoneos/Runner.app build/ios/ipa/Payload
          cd build/ios/ipa
          zip -r GalaxyIOS.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: GalaxyIOS-ipa
          path: build/ios/ipa/GalaxyIOS.ipa

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/ipa/GalaxyIOS.ipa
          name: Galaxy iOS v${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: |
            Release for ${{ github.ref_name }}
            - IPA is unsigned (no codesign)
            - Install via AltStore/Sideloadly or similar tools